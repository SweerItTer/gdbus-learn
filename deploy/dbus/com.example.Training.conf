<!DOCTYPE busconfig PUBLIC
    "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
    "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
    <!--
      教学/联调版本策略：允许服务占用 com.example.Training，并允许客户端发消息。
      量产时建议按实际用户/组进一步收紧。
    -->
    <policy context="default">
        <allow own="com.example.Training"/>
        <allow send_destination="com.example.Training"/>
        <allow receive_sender="com.example.Training"/>
    </policy>
</busconfig>
